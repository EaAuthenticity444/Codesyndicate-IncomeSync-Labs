<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .clock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .clock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .timezone-label {
            font-size: 0.9em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .city-name {
            font-size: 1.5em;
            color: #667eea;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .time-display {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            font-family: 'Courier New', monospace;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        .date-display {
            font-size: 0.95em;
            color: #888;
            margin-bottom: 15px;
        }

        .day-display {
            font-size: 0.9em;
            color: #aaa;
            text-transform: capitalize;
        }

        .timezone-offset {
            display: inline-block;
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            color: #555;
            margin-top: 12px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .format-toggle {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
        }

        .format-toggle:hover {
            background: white;
            color: #667eea;
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .info-panel p {
            font-size: 1em;
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .time-display {
                font-size: 2em;
            }

            .clock-grid {
                grid-template-columns: 1fr;
            }
        }

        .blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49% {
                opacity: 1;
            }
            50%, 100% {
                opacity: 0.3;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌍 Global Time Zones</h1>
            <p>Real-time clock display across the world</p>
        </div>

        <div class="clock-grid" id="clockGrid"></div>

        <div class="controls">
            <button class="format-toggle" onclick="toggleFormat()">🔄 Toggle 12/24 Hour</button>
            <button onclick="addTimezone()">➕ Add Time Zone</button>
            <button onclick="resetTimezones()">🔄 Reset</button>
        </div>

        <div class="info-panel">
            <p>📍 <strong id="currentLocation">Loading...</strong></p>
            <p>⏱️ <strong id="updateInfo">Updates every second</strong></p>
        </div>
    </div>

    <script>
        // Default time zones
        const defaultTimezones = [
            { city: 'New York', timezone: 'America/New_York', emoji: '🗽' },
            { city: 'London', timezone: 'Europe/London', emoji: '🏴' },
            { city: 'Tokyo', timezone: 'Asia/Tokyo', emoji: '🗾' },
            { city: 'Sydney', timezone: 'Australia/Sydney', emoji: '🦘' },
            { city: 'Dubai', timezone: 'Asia/Dubai', emoji: '🕌' },
            { city: 'Singapore', timezone: 'Asia/Singapore', emoji: '🏙️' },
            { city: 'Mumbai', timezone: 'Asia/Kolkata', emoji: '🇮🇳' },
            { city: 'São Paulo', timezone: 'America/Sao_Paulo', emoji: '🇧🇷' },
            { city: 'Berlin', timezone: 'Europe/Berlin', emoji: '🇩🇪' },
            { city: 'Hong Kong', timezone: 'Asia/Hong_Kong', emoji: '🏮' },
        ];

        let is24HourFormat = true;
        let customTimezones = [...defaultTimezones];

        function updateClocks() {
            const grid = document.getElementById('clockGrid');
            grid.innerHTML = '';

            customTimezones.forEach((tz, index) => {
                const now = new Date();
                const formatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: tz.timezone,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: !is24HourFormat
                });

                const dateFormatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: tz.timezone,
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });

                const timeString = formatter.format(now);
                const dateString = dateFormatter.format(now);

                // Get offset
                const tzDate = new Date(now.toLocaleString('en-US', { timeZone: tz.timezone }));
                const offset = Math.round((tzDate - now) / (1000 * 60 * 60));
                const offsetStr = offset >= 0 ? `UTC+${offset}` : `UTC${offset}`;

                const card = document.createElement('div');
                card.className = 'clock-card';
                card.innerHTML = `
                    <div class="timezone-label">${tz.emoji} ${tz.timezone}</div>
                    <div class="city-name">${tz.city}</div>
                    <div class="time-display">${timeString}</div>
                    <div class="date-display">${dateString}</div>
                    <div class="timezone-offset">${offsetStr}</div>
                    <button onclick="removeTimezone(${index})" style="width: 100%; margin-top: 12px; background: #ff6b6b; color: white;">Remove</button>
                `;
                grid.appendChild(card);
            });

            updateInfo();
        }

        function updateInfo() {
            const now = new Date();
            const utcTime = new Intl.DateTimeFormat('en-US', {
                timeZone: 'UTC',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: !is24HourFormat
            }).format(now);

            document.getElementById('currentLocation').textContent = `UTC Time: ${utcTime}`;
            document.getElementById('updateInfo').textContent = `Last updated: ${now.toLocaleTimeString()}`;
        }

        function toggleFormat() {
            is24HourFormat = !is24HourFormat;
            updateClocks();
        }

        function removeTimezone(index) {
            customTimezones.splice(index, 1);
            updateClocks();
        }

        function addTimezone() {
            const allTimezones = [
                { city: 'Los Angeles', timezone: 'America/Los_Angeles', emoji: '🌴' },
                { city: 'Chicago', timezone: 'America/Chicago', emoji: '🌆' },
                { city: 'Mexico City', timezone: 'America/Mexico_City', emoji: '🇲🇽' },
                { city: 'Toronto', timezone: 'America/Toronto', emoji: '🍁' },
                { city: 'Paris', timezone: 'Europe/Paris', emoji: '🗼' },
                { city: 'Moscow', timezone: 'Europe/Moscow', emoji: '🇷🇺' },
                { city: 'Bangkok', timezone: 'Asia/Bangkok', emoji: '🇹🇭' },
                { city: 'Seoul', timezone: 'Asia/Seoul', emoji: '🇰🇷' },
                { city: 'Bangkok', timezone: 'Asia/Bangkok', emoji: '🌏' },
                { city: 'Auckland', timezone: 'Pacific/Auckland', emoji: '🇳🇿' },
            ];

            const newTz = allTimezones[Math.floor(Math.random() * allTimezones.length)];
            if (!customTimezones.find(t => t.timezone === newTz.timezone)) {
                customTimezones.push(newTz);
            } else {
                alert('This timezone is already added!');
            }
            updateClocks();
        }

        function resetTimezones() {
            customTimezones = [...defaultTimezones];
            is24HourFormat = true;
            updateClocks();
        }

        // Update every second
        setInterval(updateClocks, 1000);

        // Initial load
        updateClocks();
    </script>
</body>
</html>
